<svg width="800" height="420" viewBox="0 0 800 420" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    <![CDATA[
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;500;600&display=swap');

    .editor-bg { fill: #0d1117; }
    .editor-stroke { fill: none; stroke: #21262d; stroke-width: 1; }
    .sidebar { fill: #010409; }
    .titlebar { fill: #161b22; }
    .tab-active { fill: #0d1117; stroke: #21262d; stroke-width: 1; }
    .tab-indicator { fill: #7ee787; }

    .dot-r { fill: #ff5f57; }
    .dot-y { fill: #febc2e; }
    .dot-g { fill: #28c840; }

    .tab-text     { font-family: 'Inter', sans-serif; font-size: 11px; fill: #e6edf3; font-weight: 500; }
    .tab-text-dim { font-family: 'Inter', sans-serif; font-size: 11px; fill: #484f58; font-weight: 400; }
    .titlebar-text{ font-family: 'Inter', sans-serif; font-size: 11px; fill: #484f58; font-weight: 500; text-anchor: middle; }

    .ln      { font-family: 'JetBrains Mono', monospace; font-size: 12.5px; fill: #30363d; text-anchor: end; }
    .kw      { fill: #ff7b72; font-family: 'JetBrains Mono', monospace; font-size: 12.5px; }
    .str     { fill: #a5d6ff; font-family: 'JetBrains Mono', monospace; font-size: 12.5px; }
    .var     { fill: #ffa657; font-family: 'JetBrains Mono', monospace; font-size: 12.5px; }
    .type    { fill: #79c0ff; font-family: 'JetBrains Mono', monospace; font-size: 12.5px; }
    .prop    { fill: #7ee787; font-family: 'JetBrains Mono', monospace; font-size: 12.5px; }
    .punc    { fill: #8b949e; font-family: 'JetBrains Mono', monospace; font-size: 12.5px; }
    .comment { fill: #6e7681; font-family: 'JetBrains Mono', monospace; font-size: 12.5px; font-style: italic; }

    .cursor-blink { fill: #e6edf3; animation: blink 1.1s step-end infinite; }

    .sb-icon        { fill: #484f58; }
    .sb-icon-active { fill: #e6edf3; }
    .sb-indicator   { fill: #7ee787; }

    .l1  { animation: typeIn 0.3s 0.3s  both; }
    .l2  { animation: typeIn 0.3s 0.6s  both; }
    .l3  { animation: typeIn 0.3s 0.9s  both; }
    .l4  { animation: typeIn 0.3s 1.1s  both; }
    .l5  { animation: typeIn 0.3s 1.3s  both; }
    .l6  { animation: typeIn 0.3s 1.5s  both; }
    .l7  { animation: typeIn 0.3s 1.7s  both; }
    .l8  { animation: typeIn 0.3s 1.9s  both; }
    .l9  { animation: typeIn 0.3s 2.1s  both; }
    .l10 { animation: typeIn 0.3s 2.3s  both; }
    .l11 { animation: typeIn 0.3s 2.5s  both; }
    .l12 { animation: typeIn 0.3s 2.7s  both; }
    .l13 { animation: typeIn 0.3s 2.9s  both; }
    .l14 { animation: typeIn 0.3s 3.1s  both; }
    .l15 { animation: typeIn 0.3s 3.3s  both; }
    .l16 { animation: typeIn 0.3s 3.5s  both; }

    @keyframes typeIn {
      from { opacity: 0; transform: translateX(-4px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    .statusbar       { fill: #0550ae; }
    .statusbar-text  { font-family: 'Inter', sans-serif; font-size: 10.5px; fill: #ffffff; font-weight: 500; }
    .statusbar-right { font-family: 'Inter', sans-serif; font-size: 10.5px; fill: #ffffff; font-weight: 400; text-anchor: end; }

    .minimap-line     { fill: #21262d; }
    .minimap-line-lit { fill: #30363d; }
