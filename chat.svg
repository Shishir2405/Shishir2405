<svg width="800" height="400" viewBox="0 0 800 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&amp;family=Inter:wght@400;500;600;700&amp;display=swap');

    .terminal-bg {
      fill: #0d1117;
      rx: 12;
    }

    .terminal-header {
      fill: #161b22;
    }

    .dot-red { fill: #ff5f57; }
    .dot-yellow { fill: #febc2e; }
    .dot-green { fill: #28c840; }

    .title-text {
      fill: #8b949e;
      font-family: 'Inter', -apple-system, sans-serif;
      font-size: 12px;
      font-weight: 500;
    }

    .prompt {
      fill: #7ee787;
      font-family: 'JetBrains Mono', 'SF Mono', monospace;
      font-size: 13.5px;
      font-weight: 500;
    }

    .command {
      fill: #e6edf3;
      font-family: 'JetBrains Mono', 'SF Mono', monospace;
      font-size: 13.5px;
      font-weight: 400;
    }

    .key {
      fill: #79c0ff;
      font-family: 'JetBrains Mono', 'SF Mono', monospace;
      font-size: 13px;
      font-weight: 400;
    }

    .value {
      fill: #e6edf3;
      font-family: 'JetBrains Mono', 'SF Mono', monospace;
      font-size: 13px;
      font-weight: 400;
    }

    .string {
      fill: #a5d6ff;
      font-family: 'JetBrains Mono', 'SF Mono', monospace;
      font-size: 13px;
      font-weight: 400;
    }

    .bracket {
      fill: #8b949e;
      font-family: 'JetBrains Mono', 'SF Mono', monospace;
      font-size: 13px;
      font-weight: 400;
    }

    .accent {
      fill: #d2a8ff;
      font-family: 'JetBrains Mono', 'SF Mono', monospace;
      font-size: 13px;
      font-weight: 400;
    }

    .comment {
      fill: #6e7681;
      font-family: 'JetBrains Mono', 'SF Mono', monospace;
      font-size: 12.5px;
      font-style: italic;
      font-weight: 400;
    }

    .cursor {
      fill: #e6edf3;
      animation: blink 1s step-end infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    .line-1 { animation: fadeIn 0.3s 0.2s forwards; opacity: 0; }
    .line-2 { animation: fadeIn 0.3s 0.5s forwards; opacity: 0; }
    .line-3 { animation: fadeIn 0.3s 0.8s forwards; opacity: 0; }
    .line-4 { animation: fadeIn 0.3s 1.0s forwards; opacity: 0; }
    .line-5 { animation: fadeIn 0.3s 1.2s forwards; opacity: 0; }
    .line-6 { animation: fadeIn 0.3s 1.4s forwards; opacity: 0; }
    .line-7 { animation: fadeIn 0.3s 1.6s forwards; opacity: 0; }
    .line-8 { animation: fadeIn 0.3s 1.8s forwards; opacity: 0; }
    .line-9 { animation: fadeIn 0.3s 2.0s forwards; opacity: 0; }
    .line-10 { animation: fadeIn 0.3s 2.2s forwards; opacity: 0; }
    .line-11 { animation: fadeIn 0.3s 2.4s forwards; opacity: 0; }
    .line-12 { animation: fadeIn 0.3s 2.6s forwards; opacity: 0; }
    .line-13 { animation: fadeIn 0.3s 2.8s forwards; opacity: 0; }

    @keyframes fadeIn {
      to { opacity: 1; }
    }
  </style>

  <!-- Terminal window -->
  <rect width="800" height="400" class="terminal-bg"/>
  <rect width="800" height="36" class="terminal-header" rx="12"/>
  <rect x="0" y="24" width="800" height="12" class="terminal-header"/>

  <!-- Window controls -->
  <circle cx="20" cy="18" r="6" class="dot-red"/>
  <circle cx="40" cy="18" r="6" class="dot-yellow"/>
  <circle cx="60" cy="18" r="6" class="dot-green"/>

  <!-- Title bar text -->
  <text x="400" y="22" text-anchor="middle" class="title-text">shishir@dev ~ /about-me</text>

  <!-- Line 1: Command -->
  <g class="line-1">
    <text x="28" y="68" class="prompt">$</text>
    <text x="44" y="68" class="command">whoami --verbose</text>
  </g>

  <!-- Line 2: Name -->
  <g class="line-2">
    <text x="28" y="94" class="key">name</text>
    <text x="100" y="94" class="bracket">:</text>
    <text x="116" y="94" class="string">"Shishir Shrivastava"</text>
  </g>

  <!-- Line 3: Role -->
  <g class="line-3">
    <text x="28" y="118" class="key">role</text>
    <text x="100" y="118" class="bracket">:</text>
    <text x="116" y="118" class="string">"Full Stack Developer"</text>
  </g>

  <!-- Line 4: Location -->
  <g class="line-4">
    <text x="28" y="142" class="key">location</text>
    <text x="100" y="142" class="bracket">:</text>
    <text x="116" y="142" class="string">"Indore, India"</text>
  </g>

  <!-- Line 5: Current -->
  <g class="line-5">
    <text x="28" y="166" class="key">current</text>
    <text x="100" y="166" class="bracket">:</text>
    <text x="116" y="166" class="string">"Full Stack Developer @ Unjob.ai"</text>
  </g>

  <!-- Line 6: Stack -->
  <g class="line-6">
    <text x="28" y="196" class="key">stack</text>
    <text x="100" y="196" class="bracket">:</text>
    <text x="116" y="196" class="bracket">[</text>
    <text x="126" y="196" class="accent">React</text>
    <text x="178" y="196" class="bracket">,</text>
    <text x="190" y="196" class="accent">Next.js</text>
    <text x="262" y="196" class="bracket">,</text>
    <text x="274" y="196" class="accent">Node.js</text>
    <text x="346" y="196" class="bracket">,</text>
    <text x="358" y="196" class="accent">TypeScript</text>
    <text x="454" y="196" class="bracket">,</text>
    <text x="466" y="196" class="accent">PostgreSQL</text>
    <text x="566" y="196" class="bracket">]</text>
  </g>

  <!-- Line 7: Achievements -->
  <g class="line-7">
    <text x="28" y="226" class="key">awards</text>
    <text x="100" y="226" class="bracket">:</text>
    <text x="116" y="226" class="bracket">[</text>
    <text x="126" y="226" class="string">"2x SIH National Winner"</text>
    <text x="338" y="226" class="bracket">,</text>
    <text x="350" y="226" class="string">"Hack the Mountains Winner"</text>
    <text x="588" y="226" class="bracket">]</text>
  </g>

  <!-- Line 8: Education -->
  <g class="line-8">
    <text x="28" y="250" class="key">edu</text>
    <text x="100" y="250" class="bracket">:</text>
    <text x="116" y="250" class="string">"B.E. Computer Engineering | CGPA 9.47/10"</text>
  </g>

  <!-- Line 9: Users -->
  <g class="line-9">
    <text x="28" y="274" class="key">impact</text>
    <text x="100" y="274" class="bracket">:</text>
    <text x="116" y="274" class="string">"10,000+ users across govt &amp; industry projects"</text>
  </g>

  <!-- Line 10: Blank + separator -->
  <g class="line-10">
    <text x="28" y="304" class="comment">// building scalable systems, one deploy at a time</text>
  </g>

  <!-- Line 11: Links -->
  <g class="line-11">
    <text x="28" y="334" class="key">links</text>
    <text x="100" y="334" class="bracket">:</text>
    <text x="116" y="334" class="bracket">{</text>
    <text x="130" y="334" class="key">web</text>
    <text x="162" y="334" class="bracket">:</text>
    <text x="174" y="334" class="string">shishir24.in</text>
    <text x="284" y="334" class="bracket">|</text>
    <text x="298" y="334" class="key">gh</text>
    <text x="322" y="334" class="bracket">:</text>
    <text x="334" y="334" class="string">Shishir2405</text>
    <text x="432" y="334" class="bracket">|</text>
    <text x="446" y="334" class="key">mail</text>
    <text x="486" y="334" class="bracket">:</text>
    <text x="498" y="334" class="string">shishirshrivastava30@gmail.com</text>
    <text x="738" y="334" class="bracket">}</text>
  </g>

  <!-- Line 12: New prompt with cursor -->
  <g class="line-12">
    <text x="28" y="368" class="prompt">$</text>
    <rect x="44" y="356" width="8" height="16" class="cursor"/>
  </g>
</svg>
