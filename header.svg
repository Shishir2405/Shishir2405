<svg width="800" height="210" viewBox="0 0 800 210" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&amp;family=Inter:wght@700;800&amp;display=swap');

    .bg { fill: #0d1117; }
    .bg-stroke { fill: none; stroke: #21262d; stroke-width: 1; }

    .grid-dot { fill: #21262d; }

    /* ── Name ── */
    .name-base {
      font-family: 'Inter', -apple-system, sans-serif;
      font-size: 44px;
      font-weight: 800;
      fill: #e6edf3;
      text-anchor: middle;
      animation: nameIn 0.6s 0.2s forwards;
      opacity: 0;
    }
    .name-r {
      font-family: 'Inter', -apple-system, sans-serif;
      font-size: 44px;
      font-weight: 800;
      fill: #ff3366;
      text-anchor: middle;
      opacity: 0;
      mix-blend-mode: screen;
      animation: glitchR 5s 1s infinite;
    }
    .name-c {
      font-family: 'Inter', -apple-system, sans-serif;
      font-size: 44px;
      font-weight: 800;
      fill: #00ffcc;
      text-anchor: middle;
      opacity: 0;
      mix-blend-mode: screen;
      animation: glitchC 5s 1.15s infinite;
    }

    /* ── Subtitle ── */
    .subtitle {
      font-family: 'JetBrains Mono', 'SF Mono', monospace;
      font-size: 14px;
      font-weight: 400;
      fill: #7ee787;
      text-anchor: middle;
      letter-spacing: 5px;
      opacity: 0;
      animation: nameIn 0.5s 0.6s forwards;
    }

    .tagline {
      font-family: 'JetBrains Mono', 'SF Mono', monospace;
      font-size: 11.5px;
      fill: #484f58;
      text-anchor: middle;
      opacity: 0;
      animation: nameIn 0.5s 0.9s forwards;
    }

    /* ── Decorative glitch bars ── */
    .gl { fill: #7ee787; opacity: 0; }
    .gl-1 { animation: barFlash 5s 2s infinite; }
    .gl-2 { animation: barFlash 5s 2.6s infinite; }
    .gl-3 { animation: barFlash 5s 3.3s infinite; }

    /* ── Particles ── */
    .particle { fill: #7ee787; }
    .p1 { animation: drift 7s ease-in-out infinite; }
    .p2 { animation: drift 9s ease-in-out 1s infinite; }
    .p3 { animation: drift 6s ease-in-out 2s infinite; }
    .p4 { animation: drift 8s ease-in-out 0.5s infinite; }
    .p5 { animation: drift 10s ease-in-out 3s infinite; }
    .p6 { animation: drift 7s ease-in-out 1.5s infinite; }

    /* ── Corner brackets ── */
    .corner {
      stroke: #30363d;
      stroke-width: 1.5;
      fill: none;
      opacity: 0;
      animation: nameIn 0.4s 1.2s forwards;
    }
    .corner-accent {
      stroke: #7ee787;
      stroke-width: 1.5;
      fill: none;
      opacity: 0;
      animation: nameIn 0.4s 1.2s forwards;
      stroke-opacity: 0.4;
    }

    /* ── Scanline ── */
    .scanline {
      animation: scanDown 4s linear infinite;
    }

    /* ── Keyframes ── */
    @keyframes nameIn {
      to { opacity: 1; }
    }

    @keyframes glitchR {
      0%, 85%, 93%, 100% { opacity: 0; transform: translate(0, 0); }
      86% { opacity: 0.6; transform: translate(-4px, 1px); }
      87% { opacity: 0.4; transform: translate(3px, -1px); }
      88% { opacity: 0.7; transform: translate(-3px, 0); }
      89% { opacity: 0.3; transform: translate(2px, 1px); }
      90% { opacity: 0.6; transform: translate(-2px, -1px); }
      91% { opacity: 0; }
    }

    @keyframes glitchC {
      0%, 88%, 96%, 100% { opacity: 0; transform: translate(0, 0); }
      89% { opacity: 0.6; transform: translate(4px, -1px); }
      90% { opacity: 0.4; transform: translate(-3px, 1px); }
      91% { opacity: 0.7; transform: translate(3px, 0); }
      92% { opacity: 0.3; transform: translate(-2px, -1px); }
      93% { opacity: 0.6; transform: translate(2px, 1px); }
      94% { opacity: 0; }
    }

    @keyframes barFlash {
      0%, 84%, 90%, 100% { opacity: 0; transform: translateX(0); }
      85% { opacity: 0.4; transform: translateX(-20px); }
      86% { opacity: 0.6; transform: translateX(10px); }
      87% { opacity: 0.3; transform: translateX(-5px); }
      88% { opacity: 0; }
    }

    @keyframes drift {
      0%, 100% { transform: translateY(0px); opacity: 0.15; }
      50% { transform: translateY(-12px); opacity: 0.5; }
    }

    @keyframes scanDown {
      0% { transform: translateY(-30px); }
      100% { transform: translateY(240px); }
    }
  </style>

  <!-- Background -->
  <rect width="800" height="210" rx="12" class="bg"/>
  <rect width="800" height="210" rx="12" class="bg-stroke"/>

  <!-- Grid dots -->
  <g>
    <circle cx="40" cy="30" r="0.8" class="grid-dot"/><circle cx="80" cy="30" r="0.8" class="grid-dot"/>
    <circle cx="120" cy="30" r="0.8" class="grid-dot"/><circle cx="160" cy="30" r="0.8" class="grid-dot"/>
    <circle cx="200" cy="30" r="0.8" class="grid-dot"/><circle cx="240" cy="30" r="0.8" class="grid-dot"/>
    <circle cx="280" cy="30" r="0.8" class="grid-dot"/><circle cx="320" cy="30" r="0.8" class="grid-dot"/>
    <circle cx="360" cy="30" r="0.8" class="grid-dot"/><circle cx="400" cy="30" r="0.8" class="grid-dot"/>
    <circle cx="440" cy="30" r="0.8" class="grid-dot"/><circle cx="480" cy="30" r="0.8" class="grid-dot"/>
    <circle cx="520" cy="30" r="0.8" class="grid-dot"/><circle cx="560" cy="30" r="0.8" class="grid-dot"/>
    <circle cx="600" cy="30" r="0.8" class="grid-dot"/><circle cx="640" cy="30" r="0.8" class="grid-dot"/>
    <circle cx="680" cy="30" r="0.8" class="grid-dot"/><circle cx="720" cy="30" r="0.8" class="grid-dot"/>
    <circle cx="760" cy="30" r="0.8" class="grid-dot"/>

    <circle cx="40" cy="70" r="0.8" class="grid-dot"/><circle cx="80" cy="70" r="0.8" class="grid-dot"/>
    <circle cx="120" cy="70" r="0.8" class="grid-dot"/><circle cx="760" cy="70" r="0.8" class="grid-dot"/>
    <circle cx="720" cy="70" r="0.8" class="grid-dot"/><circle cx="680" cy="70" r="0.8" class="grid-dot"/>

    <circle cx="40" cy="110" r="0.8" class="grid-dot"/><circle cx="80" cy="110" r="0.8" class="grid-dot"/>
    <circle cx="760" cy="110" r="0.8" class="grid-dot"/><circle cx="720" cy="110" r="0.8" class="grid-dot"/>

    <circle cx="40" cy="150" r="0.8" class="grid-dot"/><circle cx="80" cy="150" r="0.8" class="grid-dot"/>
    <circle cx="120" cy="150" r="0.8" class="grid-dot"/><circle cx="760" cy="150" r="0.8" class="grid-dot"/>
    <circle cx="720" cy="150" r="0.8" class="grid-dot"/><circle cx="680" cy="150" r="0.8" class="grid-dot"/>

    <circle cx="40" cy="190" r="0.8" class="grid-dot"/><circle cx="80" cy="190" r="0.8" class="grid-dot"/>
    <circle cx="120" cy="190" r="0.8" class="grid-dot"/><circle cx="160" cy="190" r="0.8" class="grid-dot"/>
    <circle cx="200" cy="190" r="0.8" class="grid-dot"/><circle cx="240" cy="190" r="0.8" class="grid-dot"/>
    <circle cx="280" cy="190" r="0.8" class="grid-dot"/><circle cx="320" cy="190" r="0.8" class="grid-dot"/>
    <circle cx="360" cy="190" r="0.8" class="grid-dot"/><circle cx="400" cy="190" r="0.8" class="grid-dot"/>
    <circle cx="440" cy="190" r="0.8" class="grid-dot"/><circle cx="480" cy="190" r="0.8" class="grid-dot"/>
    <circle cx="520" cy="190" r="0.8" class="grid-dot"/><circle cx="560" cy="190" r="0.8" class="grid-dot"/>
    <circle cx="600" cy="190" r="0.8" class="grid-dot"/><circle cx="640" cy="190" r="0.8" class="grid-dot"/>
    <circle cx="680" cy="190" r="0.8" class="grid-dot"/><circle cx="720" cy="190" r="0.8" class="grid-dot"/>
    <circle cx="760" cy="190" r="0.8" class="grid-dot"/>
  </g>

  <!-- Corner brackets -->
  <polyline points="24,42 24,24 42,24" class="corner"/>
  <polyline points="776,42 776,24 758,24" class="corner"/>
  <polyline points="24,168 24,186 42,186" class="corner"/>
  <polyline points="776,168 776,186 758,186" class="corner"/>

  <polyline points="28,46 28,28 46,28" class="corner-accent"/>
  <polyline points="772,46 772,28 754,28" class="corner-accent"/>
  <polyline points="28,164 28,182 46,182" class="corner-accent"/>
  <polyline points="772,164 772,182 754,182" class="corner-accent"/>

  <!-- Glitch horizontal bars -->
  <rect x="50" y="78" width="180" height="1.5" rx="1" class="gl gl-1"/>
  <rect x="350" y="92" width="120" height="1" rx="1" class="gl gl-2"/>
  <rect x="550" y="85" width="200" height="1.5" rx="1" class="gl gl-3"/>

  <!-- Name - base -->
  <text x="400" y="100" class="name-base">SHISHIR SHRIVASTAVA</text>

  <!-- Name - glitch red -->
  <text x="400" y="100" class="name-r">SHISHIR SHRIVASTAVA</text>

  <!-- Name - glitch cyan -->
  <text x="400" y="100" class="name-c">SHISHIR SHRIVASTAVA</text>

  <!-- Subtitle -->
  <text x="400" y="135" class="subtitle">&lt; FULL STACK DEVELOPER /&gt;</text>

  <!-- Tagline -->
<text x="400" y="168" class="tagline">// building scalable systems &#183; 10,000+ users &#183; 2x SIH National Winner</text>

  <!-- Floating particles -->
  <circle cx="90" cy="55" r="2" class="particle p1"/>
  <circle cx="710" cy="48" r="1.5" class="particle p2"/>
  <circle cx="130" cy="165" r="1.8" class="particle p3"/>
  <circle cx="670" cy="158" r="1.5" class="particle p4"/>
  <circle cx="250" cy="40" r="1.2" class="particle p5"/>
  <circle cx="560" cy="172" r="1.8" class="particle p6"/>

  <!-- Scanline overlay -->
  <rect x="0" y="0" width="800" height="8" rx="0" fill="#7ee787" opacity="0.02" class="scanline"/>
</svg>
